<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LLM Orchestrator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --surface:    #f7f7fa;
      --border:     #e8e8ef;
      --text:       #1a1a2e;
      --muted:      #9090aa;
      --m-accent:   #e8453c;
      --g-accent:   #00b87a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text);
      margin: 0 6px 2px;
      vertical-align: middle;
    }

    /* ── SLIDE TOGGLE ── */
    .toggle-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }

    .toggle-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      border-radius: 8px;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.32s ease;
      z-index: 0;
      /* width set by JS */
    }

    .toggle-btn {
      position: relative;
      z-index: 1;
      background: transparent;
      border: none;
      padding: 8px 22px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.3s ease;
      white-space: nowrap;
      color: var(--muted);
    }

    .toggle-btn.active { color: #fff; }

    /* model badge */
    .model-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── CHAT AREA ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
    }

    .empty-state .bigtext {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      color: #eeeeee;
      line-height: 1;
    }

    .empty-state small { font-size: 12px; }

    /* messages */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 760px;
      width: 100%;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(7px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .av {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
    }

    .av.mistral-av { background: #fff0f0; border-color: #ffd0ce; color: var(--m-accent); }
    .av.groq-av    { background: #f0fff8; border-color: #b8f0dd; color: var(--g-accent); }

    .bubble {
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.75;
      max-width: calc(100% - 40px);
      border: 1px solid var(--border);
      background: #fff;
    }

    .msg.user .bubble {
      background: var(--surface);
      border-top-right-radius: 3px;
    }

    .msg.bot .bubble {
      border-top-left-radius: 3px;
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      border-radius: 1px;
      margin-left: 2px;
      animation: blink 0.75s steps(1) infinite;
      vertical-align: text-bottom;
    }
    .cursor.m { background: var(--m-accent); }
    .cursor.g { background: var(--g-accent); }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    /* ── INPUT FOOTER ── */
    footer {
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 760px;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--muted); }
    textarea.focus-m:focus { border-color: var(--m-accent); }
    textarea.focus-g:focus { border-color: var(--g-accent); }

    .send-btn {
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s, background 0.3s;
      flex-shrink: 0;
    }

    .send-btn:hover  { opacity: 0.85; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .footer-hint { font-size: 10px; color: var(--muted); margin-top: 7px; }
  </style>
</head>
<body>

<header>
  <div class="logo">LLM<span class="dot"></span>Orchestrator</div>

  <div class="toggle-wrap" id="toggle">
    <div class="toggle-slider" id="slider"></div>
    <button class="toggle-btn active" id="btn-mistral" onclick="switchModel('mistral')">Mistral</button>
    <button class="toggle-btn"        id="btn-groq"    onclick="switchModel('groq')">Groq Llama</button>
  </div>

  <div class="model-badge" id="model-badge">mistral-large-latest</div>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <div class="bigtext" id="empty-text">MISTRAL</div>
    <small>Send a message to start chatting</small>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="user-input" placeholder="Ask Mistral..." rows="1"
      class="focus-m"
      oninput="autoResize(this)"
      onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" style="background: var(--m-accent)">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</footer>

<script>
  let activeModel = "mistral";

  const histories = {
    mistral: [{ role: "system", content: "You are a helpful assistant." }],
    groq:    [{ role: "system", content: "You are a helpful assistant." }]
  };

  const config = {
    mistral: {
      badge: "mistral-large-latest",
      placeholder: "Ask Mistral...",
      cursorClass: "m",
      avClass: "mistral-av",
      avText: "M",
      color: "#e8453c",
      emptyLabel: "MISTRAL"
    },
    groq: {
      badge: "llama-3.3-70b-versatile",
      placeholder: "Ask Groq Llama...",
      cursorClass: "g",
      avClass: "groq-av",
      avText: "🦙",
      color: "#00b87a",
      emptyLabel: "LLAMA"
    }
  };

  // Init slider width after DOM ready
  window.addEventListener("load", () => positionSlider("mistral"));

  function positionSlider(model) {
    const slider = document.getElementById("slider");
    const btn = document.getElementById(`btn-${model}`);
    slider.style.width  = btn.offsetWidth + "px";
    slider.style.background = config[model].color;
    if (model === "groq") {
      const mBtn = document.getElementById("btn-mistral");
      slider.style.transform = `translateX(${mBtn.offsetWidth}px)`;
    } else {
      slider.style.transform = "translateX(0)";
    }
  }

  function switchModel(model) {
    if (model === activeModel) return;

    // reset previous history
    histories[activeModel] = [{ role: "system", content: "You are a helpful assistant." }];
    activeModel = model;

    const cfg = config[model];

    // slider
    positionSlider(model);

    // button active states
    document.getElementById("btn-mistral").classList.toggle("active", model === "mistral");
    document.getElementById("btn-groq").classList.toggle("active",    model === "groq");

    // badge & placeholder & send btn color
    document.getElementById("model-badge").textContent = cfg.badge;
    const ta = document.getElementById("user-input");
    ta.placeholder = cfg.placeholder;
    ta.className   = model === "mistral" ? "focus-m" : "focus-g";
    document.getElementById("send-btn").style.background = cfg.color;

    // clear messages
    document.getElementById("messages").innerHTML = `
      <div class="empty-state" id="empty">
        <div class="bigtext">${cfg.emptyLabel}</div>
        <small>Send a message to start chatting</small>
      </div>`;
  }

  function addMessage(role, text = "") {
    const container = document.getElementById("messages");
    const empty = document.getElementById("empty");
    if (empty) empty.remove();

    const cfg = config[activeModel];
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const av = document.createElement("div");
    av.className = "av" + (role === "bot" ? ` ${cfg.avClass}` : "");
    av.textContent = role === "user" ? "U" : cfg.avText;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    msg.appendChild(av);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn   = document.getElementById("send-btn");
    const text  = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    btn.disabled = true;

    addMessage("user", text);
    const botBubble = addMessage("bot");

    const cursor = document.createElement("span");
    cursor.className = `cursor ${config[activeModel].cursorClass}`;
    botBubble.appendChild(cursor);

    const res = await fetch(`/chat/${activeModel}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = JSON.parse(line.slice(6));
        if (data.content) {
          cursor.remove();
          botBubble.textContent += data.content;
          botBubble.appendChild(cursor);
          document.getElementById("messages").scrollTop = 99999;
        }
        if (data.done) cursor.remove();
      }
    }

    btn.disabled = false;
    input.focus();
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }
</script>
</body>
</html>
